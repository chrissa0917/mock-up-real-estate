<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelia Estates | Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="section dashboard-page">
      <header class="dashboard-head">
        <h1>Concierge Admin Dashboard</h1>
        <a href="/" class="btn btn-secondary">Back to Platform</a>
      </header>

      <section class="stats-grid">
        <article class="glass-panel stat-card"><h2>Total Tour Requests</h2><p id="totalTours">0</p></article>
        <article class="glass-panel stat-card"><h2>Total Proposal Requests</h2><p id="totalProposals">0</p></article>
        <article class="glass-panel stat-card"><h2>New Leads</h2><p id="newLeads">0</p></article>
        <article class="glass-panel stat-card"><h2>Pending Follow-ups</h2><p id="pendingFollowUps">0</p></article>
      </section>

      <section class="glass-panel table-panel">
        <h2>Recent Bookings</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Property</th><th>Date</th><th>Time</th><th>Name</th><th>Email</th><th>Phone</th><th>Notes</th><th>Status</th></tr>
            </thead>
            <tbody id="bookingRows"></tbody>
          </table>
        </div>
      </section>

      <section class="glass-panel table-panel">
        <h2>Recent Proposal Requests</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Budget</th><th>Location</th><th>Property Type</th><th>Timeline</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th></tr>
            </thead>
            <tbody id="proposalRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
